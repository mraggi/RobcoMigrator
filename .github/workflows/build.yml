name: Build RobCo Migrator (All-Versions)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      VCPKG_BINARY_SOURCES: 'clear;default'
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
      # Explicitly route sccache to the new GHA cache backend
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Latest CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 'latest'

      # FIX: Bumped to v0.0.10 and removed the legacy v0.5.4 constraint
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Patch MSVC Preprocessor Bug in CommonLibF4
        run: |
          $file = "lib/CommonLibF4/include/REX/W32/CORE.hpp"
          if (Test-Path $file) {
              (Get-Content $file) -replace '#if _INC_WINAPIFAMILY != 0', '#if !defined(_INC_WINAPIFAMILY)' | Set-Content $file
          }

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '5e5d0e1cd7785623065e77eff011afdeec1a3574'

      - name: Configure CMake
        run: >
          cmake -B build -S .
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=x64-windows-static-md

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RobCoMigrator_AllVersions
          path: build/**/*.dll
